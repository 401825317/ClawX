appId: app.clawx.desktop
productName: UClaw
copyright: Copyright © 2026 UClaw
compression: maximum
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: resources

files:
  - dist
  - dist-electron
  - package.json

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
      - "!icons/*.md"
      - "!icons/*.svg"
      - "!bin/**"
      - "!screenshot/**"
  # OpenClaw package (node_modules copied separately by afterPack hook
  # because electron-builder respects .gitignore which excludes node_modules/)
  - from: build/openclaw/
    to: openclaw/
  # NOTE: OpenClaw plugin mirrors (dingtalk, etc.) are bundled by the
  # afterPack hook (after-pack.cjs) directly from node_modules, so they
  # don't need an extraResources entry here.

afterPack: ./scripts/after-pack.cjs

asar: true
asarUnpack:
  - "**/*.node"
  # Electron Main uses sharp for packaged shot QA. Keep its JS/native runtime
  # together on disk so libvips can load before any BrowserWindow is created.
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/sharp-*/**"
  # lru-cache CJS/ESM interop: older CJS versions (v5, v6, v7) don't export
  # `LRUCache` as a named property, breaking `import { LRUCache }` in Node.js
  # 22+ (Electron 40+).  Unpacking lets afterPack patch them in place.
  - "**/node_modules/lru-cache/**"

# Disable native module rebuilding.
# The Electron Main process uses the prebuilt sharp win32 runtime above.
# Other native modules (opus, koffi, and OpenClaw's own sharp copy) belong to
# OpenClaw, which is bundled separately and runs in its own process. Do not let
# @electron/rebuild replace these pinned prebuilt binaries.
npmRebuild: false

# Auto-update configuration
# Packaged defaults point at the managed new-api feed. electron/main/updater.ts
# reapplies the channel-specific managed URL at runtime and performs the
# request-scoped legacy OSS fallback used by installed builds.
publish:
  - provider: generic
    url: https://zz-cn.lingzhiwuxian.com/api/clawx/updates/feed/latest
    useMultipleRangeRequest: false
  - provider: github
    owner: ValueCell-ai
    repo: ClawX

# macOS Configuration
mac:
  extraResources:
    - from: resources/bin/darwin-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  category: public.app-category.productivity
  icon: resources/icons/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  notarize: true
  extendInfo:
    NSMicrophoneUsageDescription: UClaw requires microphone access for voice features
    NSCameraUsageDescription: UClaw requires camera access for video features

dmg:
  # Explicit volume size prevents dmg-builder@1.2.0 auto-calculation from
  # underestimating (causes "No space left on device" for large app bundles).
  # The final .dmg is bzip2-compressed, so this only affects the temp volume.
  size: 2g
  background: resources/dmg-background.png
  icon: resources/icons/icon.icns
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - type: file
      x: 130
      y: 220
    - type: link
      path: /Applications
      x: 410
      y: 220

# Windows Configuration
win:
  # Skip update signature verification: we ship via OSS + GitHub without a
  # code-signing certificate, so verifying would always fail on the updater.
  verifyUpdateCodeSignature: false
  extraResources:
    - from: resources/bin/win32-${arch}
      to: bin
    - from: resources/cli/win32/
      to: cli/
  icon: resources/icons/icon.ico
  target:
    - target: nsis
      arch: x64

nsis:
  oneClick: false
  perMachine: false
  warningsAsErrors: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  differentialPackage: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: UClaw
  uninstallDisplayName: UClaw
  license: LICENSE
  include: scripts/installer.nsh
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico

portable:
  artifactName: ${productName}-${version}-${os}-${arch}-portable.${ext}

# Linux Configuration
linux:
  extraResources:
    - from: resources/bin/linux-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  icon: resources/icons
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
  category: Utility
  maintainer: UClaw Team <public@valuecell.ai>
  vendor: UClaw
  synopsis: AI Assistant powered by OpenClaw
  description: UClaw is a graphical AI assistant application that integrates with OpenClaw Gateway to provide intelligent automation and assistance across multiple messaging platforms.
  desktop:
    entry:
      Name: UClaw
      Comment: AI Assistant powered by OpenClaw
      Categories: Utility;Network;
      Keywords: ai;assistant;automation;chat;
      StartupWMClass: clawx

appImage:
  license: LICENSE

deb:
  depends:
    # Use OR syntax to support both Ubuntu 22.04 and Ubuntu 24.04 (t64 transition).
    # Ubuntu 24.04 renamed many libraries with a t64 suffix (64-bit time_t ABI transition).
    - libgtk-3-0 | libgtk-3-0t64
    - libnotify4 | libnotify4t64
    - libnss3
    - libxss1 | libxss1t64
    - libxtst6 | libxtst6t64
    - xdg-utils
    - libatspi2.0-0 | libatspi2.0-0t64
    - libuuid1
  afterInstall: scripts/linux/after-install.sh
  afterRemove: scripts/linux/after-remove.sh
