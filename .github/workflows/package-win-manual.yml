name: Package Windows (Manual)

on:
  push:
    branches:
      - feature/uclaw-agent-runtime-contract
      - feature/uclaw-general-agent-orchestration
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA). Leave empty for current default ref.'
        required: false
        default: ''
      package_type:
        description: 'Windows package type'
        required: true
        default: 'usb_zip'
        type: choice
        options:
          - usb_zip
          - installer
          - upgrade_matrix
      require_private_installer:
        description: 'Require a privately distributed v1.0.1 NSIS installer in the upgrade matrix'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.3'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Prefer HTTPS for public GitHub git dependencies
        run: |
          git config --global "url.https://github.com/.insteadOf" "git@github.com:"
          git config --global --add "url.https://github.com/.insteadOf" "ssh://git@github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        shell: pwsh
        run: |
          $appVersion = node -p "require('./package.json').version"
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows USB ZIP
        if: ${{ github.event_name == 'push' || inputs.package_type == 'usb_zip' || inputs.package_type == 'upgrade_matrix' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run package:win:usb

      - name: Build Windows installer
        if: ${{ inputs.package_type == 'installer' || inputs.package_type == 'upgrade_matrix' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run package:win

      - name: Run Windows cross-version upgrade matrix
        if: ${{ inputs.package_type == 'upgrade_matrix' }}
        shell: pwsh
        env:
          UCLAW_UPGRADE_INSTALLER_101_URL: ${{ secrets.UCLAW_UPGRADE_INSTALLER_101_URL }}
          UCLAW_UPGRADE_INSTALLER_101_SHA512: ${{ secrets.UCLAW_UPGRADE_INSTALLER_101_SHA512 }}
        run: |
          if ('${{ inputs.require_private_installer }}' -eq 'true') {
            pnpm run test:upgrade:win -- --require-complete-installers
          } else {
            pnpm run test:upgrade:win
          }

      - name: Upload Windows USB ZIP
        if: ${{ github.event_name == 'push' || inputs.package_type == 'usb_zip' || inputs.package_type == 'upgrade_matrix' }}
        uses: actions/upload-artifact@v7
        with:
          path: release/UClaw-${{ env.APP_VERSION }}-win-x64-usb.zip
          archive: false
          if-no-files-found: error
          retention-days: 7

      - name: Upload Windows USB metadata
        if: ${{ github.event_name == 'push' || inputs.package_type == 'usb_zip' || inputs.package_type == 'upgrade_matrix' }}
        uses: actions/upload-artifact@v7
        with:
          path: release/UClaw-${{ env.APP_VERSION }}-win-x64-usb.json
          archive: false
          if-no-files-found: error
          retention-days: 7

      - name: Upload Windows Installer (x64)
        if: ${{ inputs.package_type == 'installer' || inputs.package_type == 'upgrade_matrix' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-x64
          path: release/*-win-x64.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload Windows Blockmap Files
        if: ${{ inputs.package_type == 'installer' || inputs.package_type == 'upgrade_matrix' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-blockmap
          path: release/*.blockmap
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Windows Update Manifests
        if: ${{ inputs.package_type == 'installer' || inputs.package_type == 'upgrade_matrix' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-update-manifests
          path: |
            release/*.yml
            !release/builder-debug.yml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Windows upgrade matrix report
        if: ${{ always() && inputs.package_type == 'upgrade_matrix' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-upgrade-matrix
          path: release/regression/windows-upgrade-matrix-*
          if-no-files-found: error
          retention-days: 14
